name: Trigger Release Pipeline

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release'
        required: true
        type: string

jobs:
  trigger-release:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Shared Release Repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/release/dispatches \
            -d '{"event_type": "java-backend-release", "client_payload": {"repository": "${{ github.repository }}", "tag_name": "${{ inputs.tag_name }}"}}'
